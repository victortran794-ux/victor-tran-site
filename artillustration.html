<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art &amp; Illustration — Victor Tran Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&family=Barlow:wght@400;600;700&family=Source+Code+Pro:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="cursor-dot"  aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="images/nav-logo.webp" alt="Victor Tran" width="34" height="34">
        <span class="nav-logo-name">Victor Tran</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="mailto:victortran794@gmail.com" class="nav-contact">Contact</a></li>
      </ul>
      <button class="theme-toggle" aria-label="Toggle dark mode">
        <span class="theme-toggle-icon"></span>
      </button>
    </div>
  </nav>

  <main class="page-content">

    <header class="page-header">
      <p class="section-label label-artwork">Artwork</p>
      <h1 class="page-header-title">Art &amp; Illustration</h1>
      <p class="page-header-desc">I draw and paint.</p>
    </header>

    <!-- IBM Selectric — featured spotlight -->
    <div class="gallery-spotlight">
      <figure class="gallery-spotlight-fig">
        <img loading="lazy" src="images/illus-ibm-selectric.jpg" alt="IBM Selectric 1961 — blueprint illustration">
      </figure>
    </div>

    <!-- Digital illustrations — masonry grid -->
    <div class="gallery-grid">
      <img loading="lazy" src="images/illus-untitled-4.jpg"    alt="Isometric architecture">
      <img loading="lazy" src="images/illus-untitled-2.jpg"    alt="Golden mask">
      <img loading="lazy" src="images/illus-solar.jpg"         alt="Solar">
      <img loading="lazy" src="images/illus-untitled-1.jpg"    alt="Cosmic figure">
      <img loading="lazy" src="images/illus-1-9-24.jpg"        alt="Digital painting">
      <img loading="lazy" src="images/illus-shelly.jpg"        alt="Shelly">
    </div>

    <!-- Chicago Chapter poster series -->
    <section class="gallery-section gallery-group-chicago">
      <p class="section-label label-artwork" style="padding: 0 var(--page-x) 10px; max-width: var(--max-w); margin: 0 auto;">Series</p>
      <h2 class="gallery-section-title">56th Supreme Chapter Chicago</h2>
      <div class="gallery-grid gallery-grid--trio">
        <img loading="lazy" src="images/illus-sc-boat.jpg"   alt="Supreme Chapter Chicago — boat poster">
        <img loading="lazy" src="images/illus-sc-park.jpg"   alt="Supreme Chapter Chicago — park map poster">
        <img loading="lazy" src="images/illus-sc-tower.jpg"  alt="Supreme Chapter Chicago — tower poster">
      </div>
    </section>

    <!-- Hand-drawn traditional work -->
    <section class="gallery-section gallery-group-traditional">
      <h2 class="gallery-section-title">Traditional Work</h2>
      <div class="gallery-row">
        <img loading="lazy" src="images/illus-large.jpg"    alt="Large ink and pen drawing">
        <img loading="lazy" src="images/illus-img7358.jpg"  alt="Colorful creature painting">
        <img loading="lazy" src="images/illus-img4537.jpg"  alt="Traditional ink drawing — detailed face">
        <img loading="lazy" src="images/illus-img4531.jpg"  alt="Traditional ink drawing — large composition">
        <img loading="lazy" src="images/illus-img7324.jpg"  alt="Traditional paintings on canvas">
      </div>
    </section>

    <!-- More digital illustrations -->
    <div class="gallery-grid">
      <img loading="lazy" src="images/illus-glow.jpg"          alt="Glow">
      <img loading="lazy" src="images/illus-forgive-me.jpg"    alt="Forgive Me">
      <img loading="lazy" src="images/illus-1-14-24.jpg"       alt="Green hooded figure">
      <img loading="lazy" src="images/illus-night-glow.jpg"    alt="Night Glow">
      <img loading="lazy" src="images/illus-sharing.jpg"       alt="Sharing">
      <img loading="lazy" src="images/illus-shatter.jpg"       alt="Shatter">
      <img loading="lazy" src="images/illus-little-shop.jpg"   alt="Little Shop of Horrors">
      <img loading="lazy" src="images/illus-flesh-golem.jpg"   alt="The Flesh Golem">
      <img loading="lazy" src="images/illus-lost.jpg"          alt="Lost">
      <img loading="lazy" src="images/illus-untitled-3.jpg"    alt="Abstract figure">
    </div>

    <!-- Horned-woman variation series — horizontal carousel -->
    <section class="series-carousel" aria-label="Horned woman illustration series">
      <div class="series-carousel-track">
        <figure class="series-carousel-item"><img loading="lazy" src="images/illus-untitled-5.jpg"  alt="Horned woman — pencil sketch"></figure>
        <figure class="series-carousel-item"><img loading="lazy" src="images/illus-untitled-6.jpg"  alt="Horned woman — painted"></figure>
        <figure class="series-carousel-item"><img loading="lazy" src="images/illus-untitled-7.jpg"  alt="Horned woman — stylized B&amp;W"></figure>
        <figure class="series-carousel-item"><img loading="lazy" src="images/illus-untitled-8.jpg"  alt="Horned woman — glitch"></figure>
        <figure class="series-carousel-item"><img loading="lazy" src="images/illus-untitled-9.jpg"  alt="Horned woman — pink overlay"></figure>
        <figure class="series-carousel-item"><img loading="lazy" src="images/illus-untitled-10.jpg" alt="Horned woman — watercolor"></figure>
        <figure class="series-carousel-item"><img loading="lazy" src="images/illus-untitled-11.jpg" alt="Horned woman — blue ink"></figure>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-tagline">Do more good things.</p>
      <p class="footer-subtitle">See you soon.</p>
      <a href="mailto:victortran794@gmail.com" class="footer-cta">Let's build something together.</a>
      <div class="footer-bottom">
        <span class="footer-copyright">© Victor Tran 2026 All Rights Reserved</span>
        <div class="footer-social">
          <a href="https://www.linkedin.com/in/victortrandesign/" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
